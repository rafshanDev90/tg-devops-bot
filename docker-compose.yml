services:
  bot:
    build:
      context: .
      dockerfile: server/Dockerfile.bot
    container_name: tg-devops-bot
    restart: unless-stopped
    env_file:
      - ./server/.env

    # Limits: bot only needs ~64-128M; 256M gives safe headroom
    mem_limit: 256m
    cpus: '1.0'

    healthcheck:
      # wget checks the HTTP health endpoint (confirmed bot is responding)
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
