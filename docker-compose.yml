services:
  bot:
    build:
      context: ./server
      dockerfile: Dockerfile.bot
    container_name: tg-devops-bot
    restart: unless-stopped
    env_file:
      - ./server/.env

    # Limits: bot only needs ~64-128M; 256M gives safe headroom
    mem_limit: 256m
    cpus: '1.0'

    healthcheck:
      # pgrep checks the node process is alive (no HTTP server in this bot)
      test: [ "CMD", "pgrep", "-f", "node index.js" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
